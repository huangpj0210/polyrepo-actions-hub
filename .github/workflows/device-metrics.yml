name: device-metrics

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        type: choice
        required: true
        default: "codex/rust-migration"
        options:
          - codex/rust-migration
          - main
          - refactor/second-pass
      deploy:
        description: "Build and push Docker image"
        type: boolean
        required: true
        default: true
      image_tag:
        description: "Optional Docker image tag"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    env:
      SOURCE_DIR: source
    steps:
      - name: Configure source repository auth
        shell: bash
        env:
          SOURCE_GIT_URL: ${{ secrets.DEVICE_METRICS_GIT_URL }}
          SOURCE_SSH_KEY: ${{ secrets.DEVICE_METRICS_REPO_SSH_KEY }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$SOURCE_GIT_URL" ]; then
            echo "Missing secret: DEVICE_METRICS_GIT_URL" >&2
            exit 1
          fi

          auth_dir="$RUNNER_TEMP/device-metrics-source-auth"
          mkdir -p "$auth_dir"
          chmod 700 "$auth_dir"

          case "$SOURCE_GIT_URL" in
            git@*|ssh://*)
              if [ -z "$SOURCE_SSH_KEY" ]; then
                echo "Missing secret: DEVICE_METRICS_REPO_SSH_KEY" >&2
                exit 1
              fi
              printf '%s\n' "$SOURCE_SSH_KEY" > "$auth_dir/source_key"
              chmod 600 "$auth_dir/source_key"
              ssh-keyscan github.com > "$auth_dir/known_hosts"
              echo "GIT_SSH_COMMAND=ssh -i $auth_dir/source_key -o UserKnownHostsFile=$auth_dir/known_hosts -o StrictHostKeyChecking=yes" >> "$GITHUB_ENV"
              ;;
            https://github.com/*)
              if [ -z "$GH_USERNAME" ] || [ -z "$GH_TOKEN" ]; then
                echo "Missing secret: GH_USERNAME or GH_TOKEN" >&2
                exit 1
              fi
              echo "::add-mask::$GH_USERNAME"
              echo "::add-mask::$GH_TOKEN"
              ;;
            *)
              echo "DEVICE_METRICS_GIT_URL must be a GitHub SSH or HTTPS URL." >&2
              exit 1
              ;;
          esac

      - name: Clone source repository
        shell: bash
        env:
          SOURCE_GIT_URL: ${{ secrets.DEVICE_METRICS_GIT_URL }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CHECKOUT_BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail

          clone_url="$SOURCE_GIT_URL"
          if [[ "$SOURCE_GIT_URL" == https://github.com/* ]]; then
            repo_path="${SOURCE_GIT_URL#https://github.com/}"
            clone_url="https://${GH_USERNAME}:${GH_TOKEN}@github.com/${repo_path}"
            echo "::add-mask::$clone_url"
          fi

          echo "Cloning branch: $CHECKOUT_BRANCH"
          git clone --depth 1 --branch "$CHECKOUT_BRANCH" "$clone_url" "$SOURCE_DIR"

      - name: Build and push Docker image
        if: ${{ inputs.deploy == true }}
        shell: bash
        env:
          REGISTRY_HOST: ${{ vars.DEVICE_METRICS_REGISTRY_HOST || secrets.DEVICE_METRICS_REGISTRY_HOST || vars.ALIYUN_REGISTRY_HOST || secrets.ALIYUN_REGISTRY_HOST || vars.QX_REGISTRY_HOST || secrets.QX_REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.DEVICE_METRICS_REGISTRY_USERNAME || secrets.ALIYUN_REGISTRY_USERNAME || secrets.QX_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.DEVICE_METRICS_REGISTRY_PASSWORD || secrets.ALIYUN_REGISTRY_PASSWORD || secrets.QX_REGISTRY_PASSWORD }}
          IMAGE_NAME: ${{ vars.DEVICE_METRICS_IMAGE_NAME || secrets.DEVICE_METRICS_IMAGE_NAME }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -z "$REGISTRY_HOST" ] || [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_PASSWORD" ] || [ -z "$IMAGE_NAME" ]; then
            echo "Missing registry configuration for device-metrics" >&2
            exit 1
          fi

          cd "$SOURCE_DIR"
          if [ ! -f Dockerfile ]; then
            echo "Dockerfile was not found in selected branch: ${{ inputs.branch }}" >&2
            exit 1
          fi

          if [ -f web/pnpm-workspace.yaml ] && ! grep -Eq '^[[:space:]]*packages:' web/pnpm-workspace.yaml; then
            echo "Adding missing packages field to web/pnpm-workspace.yaml for pnpm..."
            tmp_workspace="$(mktemp)"
            {
              echo 'packages:'
              echo '  - "."'
              echo ''
              cat web/pnpm-workspace.yaml
            } > "$tmp_workspace"
            mv "$tmp_workspace" web/pnpm-workspace.yaml
          fi

          source_sha="$(git rev-parse --short=12 HEAD)"
          image_tag="$INPUT_IMAGE_TAG"
          if [ -z "$image_tag" ]; then
            image_tag="$source_sha"
          fi

          image="$REGISTRY_HOST/$IMAGE_NAME:$image_tag"
          echo "Docker image: $image"
          echo "Source commit: $source_sha"

          docker build --platform linux/amd64 -t "$image" .
          printf '%s\n' "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin
          docker push "$image"

          {
            echo "### device-metrics Docker image"
            echo ""
            echo "- Branch: \`${{ inputs.branch }}\`"
            echo "- Image: \`$image\`"
            echo "- Tag: \`$image_tag\`"
            echo "- Source commit: \`$source_sha\`"
          } >> "$GITHUB_STEP_SUMMARY"
