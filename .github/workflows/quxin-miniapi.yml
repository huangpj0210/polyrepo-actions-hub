name: quxin-miniapi CI/CD

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional branch, tag, or commit to build"
        required: false
        default: ""
      deploy:
        description: "Build and push Docker image"
        type: boolean
        required: true
        default: false
      image_tag:
        description: "Optional Docker image tag"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      SOURCE_DIR: source
      BINARY_NAME: quxin-miniapi
    steps:
      - name: Setup SSH for Gitee
        shell: bash
        env:
          GITEE_SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
          GITEE_SSH_PRIVATE_KEY_B64: ${{ secrets.GITEE_SSH_PRIVATE_KEY_B64 }}
          SOURCE_GIT_URL: ${{ secrets.QUXIN_MINIAPI_GIT_URL }}
        run: |
          set -euo pipefail

          if [ -z "$GITEE_SSH_PRIVATE_KEY" ] && [ -z "$GITEE_SSH_PRIVATE_KEY_B64" ]; then
            echo "Missing secret: GITEE_SSH_PRIVATE_KEY or GITEE_SSH_PRIVATE_KEY_B64" >&2
            exit 1
          fi

          if [ -z "$SOURCE_GIT_URL" ]; then
            echo "Missing secret: QUXIN_MINIAPI_GIT_URL" >&2
            exit 1
          fi

          mkdir -p ~/.ssh

          if [ -n "$GITEE_SSH_PRIVATE_KEY_B64" ]; then
            printf '%s' "$GITEE_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/gitee_key
          else
            printf '%b\n' "$GITEE_SSH_PRIVATE_KEY" > ~/.ssh/gitee_key
          fi

          tr -d '\r' < ~/.ssh/gitee_key > ~/.ssh/gitee_key.clean
          mv ~/.ssh/gitee_key.clean ~/.ssh/gitee_key
          chmod 600 ~/.ssh/gitee_key

          if ! ssh-keygen -y -P "" -f ~/.ssh/gitee_key > /dev/null; then
            echo "The Gitee SSH private key secret is not a valid unencrypted private key." >&2
            echo "Use the full private key, including BEGIN/END lines, or set GITEE_SSH_PRIVATE_KEY_B64 to its base64 value." >&2
            exit 1
          fi

          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'EOF'
          Host gitee.com
            HostName gitee.com
            User git
            IdentityFile ~/.ssh/gitee_key
            IdentitiesOnly yes
          EOF

      - name: Clone source repository
        shell: bash
        env:
          SOURCE_GIT_URL: ${{ secrets.QUXIN_MINIAPI_GIT_URL }}
          CHECKOUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          if [ -n "$CHECKOUT_REF" ]; then
            git clone --depth 1 --branch "$CHECKOUT_REF" "$SOURCE_GIT_URL" "$SOURCE_DIR"
          else
            git clone --depth 1 "$SOURCE_GIT_URL" "$SOURCE_DIR"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.SOURCE_DIR }}/go.mod
          cache-dependency-path: ${{ env.SOURCE_DIR }}/go.sum

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail

          cd "$SOURCE_DIR"
          go version
          go mod download
          go test ./...
          go build -ldflags="-s -w" -tags no_k8s -o "$BINARY_NAME" .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: quxin-miniapi
          path: ${{ env.SOURCE_DIR }}/${{ env.BINARY_NAME }}
          if-no-files-found: error

      - name: Build and push Docker image
        if: ${{ inputs.deploy == true }}
        shell: bash
        env:
          REGISTRY_HOST: ${{ secrets.QX_REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.QX_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.QX_REGISTRY_PASSWORD }}
          IMAGE_NAME: ${{ secrets.QX_MINIAPI_IMAGE_NAME }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -z "$REGISTRY_HOST" ] || [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_PASSWORD" ] || [ -z "$IMAGE_NAME" ]; then
            echo "Missing one of: QX_REGISTRY_HOST, QX_REGISTRY_USERNAME, QX_REGISTRY_PASSWORD, QX_MINIAPI_IMAGE_NAME" >&2
            exit 1
          fi

          image_tag="$INPUT_IMAGE_TAG"
          if [ -z "$image_tag" ]; then
            image_tag="${GITHUB_SHA::12}"
          fi

          cd "$SOURCE_DIR"
          image="$REGISTRY_HOST/$IMAGE_NAME:$image_tag"
          docker build -t "$image" .
          printf '%s\n' "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin
          docker push "$image"
