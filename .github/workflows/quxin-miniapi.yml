name: quxin-miniapi CI/CD

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional branch, tag, or commit to build"
        required: false
        default: ""
      deploy:
        description: "Build and push Docker image"
        type: boolean
        required: true
        default: false
      image_tag:
        description: "Optional Docker image tag"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      SOURCE_DIR: source
      BINARY_NAME: quxin-miniapi
    steps:
      - name: Configure Gitee token auth
        shell: bash
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          SOURCE_GIT_URL: ${{ secrets.QUXIN_MINIAPI_GIT_URL }}
        run: |
          set -euo pipefail

          if [ -z "$GITEE_USERNAME" ] || [ -z "$GITEE_TOKEN" ]; then
            echo "Missing secret: GITEE_USERNAME or GITEE_TOKEN" >&2
            exit 1
          fi

          if [ -z "$SOURCE_GIT_URL" ]; then
            echo "Missing secret: QUXIN_MINIAPI_GIT_URL" >&2
            exit 1
          fi

          case "$SOURCE_GIT_URL" in
            https://gitee.com/*) ;;
            *)
              echo "QUXIN_MINIAPI_GIT_URL must be an HTTPS Gitee URL when using token auth." >&2
              exit 1
              ;;
          esac

          auth_dir="$RUNNER_TEMP/gitee-auth"
          mkdir -p "$auth_dir"
          chmod 700 "$auth_dir"

          printf '%s' "$GITEE_USERNAME" | tr -d '\r\n' > "$auth_dir/username"
          printf '%s' "$GITEE_TOKEN" | tr -d '\r\n' > "$auth_dir/token"
          chmod 600 "$auth_dir/username" "$auth_dir/token"

          cat > "$auth_dir/askpass.sh" <<'EOF'
          #!/usr/bin/env bash
          auth_dir="${GITEE_AUTH_DIR:?}"
          case "$1" in
            *Username*) cat "$auth_dir/username" ;;
            *Password*) cat "$auth_dir/token" ;;
            *) printf '\n' ;;
          esac
          EOF
          chmod 700 "$auth_dir/askpass.sh"

          echo "GITEE_AUTH_DIR=$auth_dir" >> "$GITHUB_ENV"
          echo "GIT_ASKPASS=$auth_dir/askpass.sh" >> "$GITHUB_ENV"
          echo "GIT_TERMINAL_PROMPT=0" >> "$GITHUB_ENV"

      - name: Clone source repository
        shell: bash
        env:
          SOURCE_GIT_URL: ${{ secrets.QUXIN_MINIAPI_GIT_URL }}
          CHECKOUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          if [ -n "$CHECKOUT_REF" ]; then
            git clone --depth 1 --branch "$CHECKOUT_REF" "$SOURCE_GIT_URL" "$SOURCE_DIR"
          else
            git clone --depth 1 "$SOURCE_GIT_URL" "$SOURCE_DIR"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.SOURCE_DIR }}/go.mod
          cache-dependency-path: ${{ env.SOURCE_DIR }}/go.sum

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail

          cd "$SOURCE_DIR"
          go version
          go mod download
          go test ./...
          go build -ldflags="-s -w" -tags no_k8s -o "$BINARY_NAME" .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: quxin-miniapi
          path: ${{ env.SOURCE_DIR }}/${{ env.BINARY_NAME }}
          if-no-files-found: error

      - name: Build and push Docker image
        if: ${{ inputs.deploy == true }}
        shell: bash
        env:
          REGISTRY_HOST: ${{ secrets.QX_REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.QX_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.QX_REGISTRY_PASSWORD }}
          IMAGE_NAME: ${{ secrets.QX_MINIAPI_IMAGE_NAME }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [ -z "$REGISTRY_HOST" ] || [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_PASSWORD" ] || [ -z "$IMAGE_NAME" ]; then
            echo "Missing one of: QX_REGISTRY_HOST, QX_REGISTRY_USERNAME, QX_REGISTRY_PASSWORD, QX_MINIAPI_IMAGE_NAME" >&2
            exit 1
          fi

          image_tag="$INPUT_IMAGE_TAG"
          if [ -z "$image_tag" ]; then
            image_tag="${GITHUB_SHA::12}"
          fi

          cd "$SOURCE_DIR"
          image="$REGISTRY_HOST/$IMAGE_NAME:$image_tag"
          docker build -t "$image" .
          printf '%s\n' "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin
          docker push "$image"
